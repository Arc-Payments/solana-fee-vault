[toolchain]
anchor_version = "0.32.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
fee_vault = "4fjNH5DfvXbfNv45DevfweY2D5sLzgdWCQ1MK6zY9HR8"

[programs.devnet]
fee_vault = "4fjNH5DfvXbfNv45DevfweY2D5sLzgdWCQ1MK6zY9HR8"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
members = ["programs/*"]

[test]
startup_wait = 30000
shutdown_wait = 2000
upgradeable = false
