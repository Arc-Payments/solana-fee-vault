include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    todo: ignore

linter:
  rules:
    - always_declare_return_types
    - prefer_final_locals
    - prefer_final_in_for_each
    - unawaited_futures
    - avoid_print
